<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Guard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1120;
            --panel: #1e293b;
            --text: #f8fafc;
            --accent: #3b82f6;
            --danger: #ef4444;
            --font-main: 'Rajdhani', sans-serif;
            --font-display: 'Orbitron', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: var(--panel);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            font-family: var(--font-display);
            color: var(--accent);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: var(--font-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-family: var(--font-main);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2563eb;
        }

        .error-msg {
            color: var(--danger);
            margin-top: 15px;
            font-weight: 600;
        }
        
        .home-link {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
        }
        
        .home-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>AUDITOR LOGIN</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Admin User ID</label>
                <input type="text" id="username" required placeholder="Hint: admin">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Hint: admin123">
            </div>
            <button type="submit" class="btn">SECURE LOGIN</button>
        </form>
        <div id="errorMsg" class="error-msg"></div>
        <a href="/" class="home-link">← Return to Home</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = '/admin-dashboard';
                } else {
                    document.getElementById('errorMsg').innerText = data.message;
                }
            })
            .catch(err => {
                document.getElementById('errorMsg').innerText = "System error occurred.";
            });
        });
    </script>
</body>
</html>
